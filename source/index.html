<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brunei Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>Brunei Sites</h1>
      <input id="search-input" type="text" placeholder="Search by site name..." autocomplete="off" />

      <div class="sidebar-divider"></div>

      <span class="sidebar-label">Filter by species</span>
      <div id="species-search-wrap">
        <input id="species-search-input" type="text" placeholder="Type a species name..." autocomplete="off" />
        <button id="btn-clear-species" class="hidden" title="Clear filter">&#x2715;</button>
        <ul id="species-suggestions" class="hidden"></ul>
      </div>
      <div id="species-badge" class="hidden"></div>

      <button id="btn-coords" title="Add site by coordinates">+ Add by Coordinates</button>
    </div>
    <ul id="site-list"></ul>
  </aside>

  <!-- Map -->
  <div id="map"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2 id="modal-title">Add Site</h2>
      <form id="site-form" enctype="multipart/form-data">
        <input type="hidden" id="field-id" />

        <label for="field-name">Name <span class="required">*</span></label>
        <input id="field-name" type="text" required placeholder="Site name" />

        <div class="coord-row">
          <div>
            <label for="field-lat">Latitude <span class="required">*</span></label>
            <input id="field-lat" type="number" step="any" required placeholder="e.g. 4.8903" />
          </div>
          <div>
            <label for="field-lng">Longitude <span class="required">*</span></label>
            <input id="field-lng" type="number" step="any" required placeholder="e.g. 114.9422" />
          </div>
        </div>

        <label for="field-desc">Description</label>
        <textarea id="field-desc" rows="4" placeholder="Add a description..."></textarea>

        <label>Flora <span class="field-hint">(type &amp; press Enter to add)</span></label>
        <div class="tag-input-wrap" id="ti-flora">
          <div class="tag-list">
            <input class="tag-field" type="text" placeholder="e.g. Nepenthes..." autocomplete="off" />
          </div>
          <ul class="tag-suggestions hidden"></ul>
        </div>

        <label>Fauna <span class="field-hint">(type &amp; press Enter to add)</span></label>
        <div class="tag-input-wrap" id="ti-fauna">
          <div class="tag-list">
            <input class="tag-field" type="text" placeholder="e.g. schmitzi..." autocomplete="off" />
          </div>
          <ul class="tag-suggestions hidden"></ul>
        </div>

        <label for="field-photo">Photo</label>
        <div id="photo-preview-wrap" class="hidden">
          <img id="photo-preview" src="" alt="Current photo" />
          <button type="button" id="btn-remove-photo">Remove photo</button>
        </div>
        <input id="field-photo" type="file" accept="image/*" />

        <div id="modal-actions">
          <button type="submit" id="btn-save">Save</button>
          <button type="button" id="btn-cancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
